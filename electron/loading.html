<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>กำลังโหลด…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .subtitle {
      font-size: 14px;
      color: #94a3b8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div>
      <div class="title">Import Excel Menu Items</div>
      <div class="subtitle" style="text-align:center; margin-top:8px;">กำลังเริ่มต้นแอปพลิเคชัน…</div>
    </div>
  </div>
</body>
</html>
